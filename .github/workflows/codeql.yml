name: "\u5b89\u5168\u626b\u63cf (CodeQL)"

run-name: "\u5b89\u5168\u626b\u63cf / ${{ github.event_name }} / ${{ github.head_ref || github.ref_name }}"

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: '18 3 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "CodeQL \u5206\u6790"
    runs-on: ubuntu-latest

    steps:
      - name: "\u68c0\u51fa\u4ed3\u5e93"
        uses: actions/checkout@v6

      - name: "\u521d\u59cb\u5316 CodeQL"
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: "\u6267\u884c CodeQL \u5206\u6790"
        uses: github/codeql-action/analyze@v4
