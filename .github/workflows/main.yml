name: "\u6301\u7eed\u96c6\u6210 (CI)"

run-name: "\u6301\u7eed\u96c6\u6210 / ${{ github.event_name }} / ${{ github.head_ref || github.ref_name }}"

on:
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: "\u57fa\u7840\u68c0\u67e5 (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-2022
          - ubuntu-latest

    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: "\u68c0\u51fa\u4ed3\u5e93"
        uses: actions/checkout@v6

      - name: "\u8bbe\u7f6e Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: "\u542f\u7528 Corepack \u5e76\u51c6\u5907 pnpm"
        run: |
          corepack enable
          corepack prepare pnpm@10.18.0 --activate

      - name: "\u5207\u6362 CI \u4e0b\u8f7d\u6e90\u4e3a\u5b98\u65b9"
        run: node scripts/prepare-ci-download-config.cjs

      - name: "\u5b89\u88c5 Linux \u7cfb\u7edf\u4f9d\u8d56"
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            icnsutils \
            graphicsmagick \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxt-dev \
            libxss1 \
            libxtst-dev \
            libasound2t64 \
            libpng++-dev \
            xz-utils

      - name: "\u5b89\u88c5\u4f9d\u8d56"
        run: pnpm install --frozen-lockfile

      - name: "\u4ee3\u7801\u68c0\u67e5"
        run: pnpm lint

      - name: "\u6784\u5efa"
        run: pnpm build

      - name: "\u6253\u5305\u5192\u70df\u68c0\u67e5"
        run: pnpm package:dir
