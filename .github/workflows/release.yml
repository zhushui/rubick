name: '正式发版 (Release)'

run-name: '正式发版 / ${{ github.event_name }} / ${{ github.ref_name }}'

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-master
  cancel-in-progress: true

jobs:
  prepare:
    name: '校验版本并准备发版'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      tag_exists: ${{ steps.release_meta.outputs.tag_exists }}
      master_commit: ${{ steps.release_meta.outputs.master_commit }}

    steps:
      - name: '检出仓库'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: '同步远端 master 与 Tag'
        run: |
          git fetch --force origin master:refs/remotes/origin/master
          git fetch --force --tags origin

      - name: '校验当前提交与版本号'
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          current_commit="$(git rev-parse HEAD^{commit})"
          master_commit="$(git rev-parse refs/remotes/origin/master^{commit})"

          if [[ "$current_commit" != "$master_commit" ]]; then
            echo "::error title=Invalid release source::正式发版只能基于当前 origin/master HEAD。当前提交=${current_commit}，origin/master=${master_commit}"
            exit 1
          fi

          version="$(node -p "require('./package.json').version")"

          if [[ -z "$version" ]]; then
            echo "::error title=Missing package version::package.json 中未找到有效的 version。"
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid package version::package.json version=${version} 不符合约定版本格式。"
            exit 1
          fi

          release_tag="v${version}"
          tag_exists="false"

          if git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" >/dev/null; then
            tag_exists="true"
            tag_commit="$(git rev-parse "refs/tags/${release_tag}^{commit}")"

            if [[ "$tag_commit" != "$master_commit" ]]; then
              echo "::error title=Version tag already exists::当前 package.json.version=${version} 对应的 Tag ${release_tag} 已存在，但它指向 ${tag_commit} 而不是当前 origin/master HEAD ${master_commit}。请在合并到 master 前更新 package.json.version。"
              exit 1
            fi
          fi

          {
            echo "version=${version}"
            echo "release_tag=${release_tag}"
            echo "tag_exists=${tag_exists}"
            echo "master_commit=${master_commit}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: '构建发布包 (${{ matrix.os }})'
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: --win nsis --x64 --ia32
            artifact_name: release-windows
            artifact_path: |
              build/*.exe
              build/*.blockmap
              build/latest.yml
          - os: macos-latest
            target: --mac dmg --x64 --arm64
            artifact_name: release-macos
            artifact_path: |
              build/*.dmg
              build/*.blockmap
              build/latest-mac.yml
          - os: ubuntu-latest
            target: --linux deb --x64
            artifact_name: release-linux
            artifact_path: build/*.deb

    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: '检出仓库'
        uses: actions/checkout@v6

      - name: '设置 Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: '启用 Corepack 并准备 pnpm'
        run: |
          corepack enable
          corepack prepare pnpm@10.18.0 --activate

      - name: '切换 CI 下载源为官方'
        run: node scripts/prepare-ci-download-config.cjs

      - name: '安装 Linux 系统依赖'
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            icnsutils \
            graphicsmagick \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxt-dev \
            libxss1 \
            libxtst-dev \
            libasound2t64 \
            libpng++-dev \
            xz-utils

      - name: '安装依赖'
        run: pnpm install --frozen-lockfile

      - name: '构建应用'
        run: pnpm build

      - name: '打包发布产物'
        run: pnpm exec electron-builder ${{ matrix.target }} --publish never

      - name: '上传发布产物'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: '创建 Tag 并发布 GitHub Release'
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      EXPECTED_MASTER_COMMIT: ${{ needs.prepare.outputs.master_commit }}

    steps:
      - name: '检出仓库'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: '同步远端 master 与 Tag'
        run: |
          git fetch --force origin master:refs/remotes/origin/master
          git fetch --force --tags origin

      - name: '确认 master 未在构建期间推进'
        shell: bash
        run: |
          set -euo pipefail

          current_commit="$(git rev-parse HEAD^{commit})"
          latest_master_commit="$(git rev-parse refs/remotes/origin/master^{commit})"

          if [[ "$current_commit" != "$EXPECTED_MASTER_COMMIT" ]]; then
            echo "::error title=Unexpected checkout state::当前工作流检出的提交 ${current_commit} 与预期发版提交 ${EXPECTED_MASTER_COMMIT} 不一致。"
            exit 1
          fi

          if [[ "$latest_master_commit" != "$EXPECTED_MASTER_COMMIT" ]]; then
            echo "::error title=master advanced during release::检测到 master 已推进到 ${latest_master_commit}，而本次构建基于旧提交 ${EXPECTED_MASTER_COMMIT}。为避免发布与源码不一致，当前发版已终止。"
            exit 1
          fi

      - name: '创建或复用正式 Tag'
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"

            if [[ "$tag_commit" != "$EXPECTED_MASTER_COMMIT" ]]; then
              echo "::error title=Version tag mismatch::Tag ${RELEASE_TAG} 已存在，但它指向 ${tag_commit} 而不是当前发版提交 ${EXPECTED_MASTER_COMMIT}。"
              exit 1
            fi

            echo "Reusing existing tag ${RELEASE_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${EXPECTED_MASTER_COMMIT}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: '下载发布产物'
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: '生成更新日志'
        run: node scripts/generate-release-notes.cjs

      - name: '生成 Release 更新载荷'
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs')

          const payload = {
            draft: false,
            prerelease: false,
            make_latest: 'true',
            name: process.env.RELEASE_TAG,
            body: fs.readFileSync('release-notes.generated.md', 'utf8'),
          }

          fs.writeFileSync(
            'release-update.json',
            `${JSON.stringify(payload, null, 2)}\n`,
            'utf8',
          )
          EOF

      - name: '发布或更新 GitHub Release'
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t asset_files < <(find release-artifacts -maxdepth 1 -type f | sort)

          if [[ "${#asset_files[@]}" -eq 0 ]]; then
            echo "::error title=Missing release artifacts::未找到任何可上传的发版产物。"
            exit 1
          fi

          release_ids="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate --jq ".[] | select(.tag_name == \"$RELEASE_TAG\") | .id")"
          release_count="$(printf '%s\n' "$release_ids" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [[ "$release_count" -gt 1 ]]; then
            while IFS= read -r release_id; do
              [[ -z "$release_id" ]] && continue
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
            done <<< "$release_ids"
            release_count=0
          fi

          if [[ "$release_count" -eq 0 ]]; then
            gh release create "$RELEASE_TAG" \
              -R "$GITHUB_REPOSITORY" \
              --verify-tag \
              --notes-file release-notes.generated.md \
              --title "$RELEASE_TAG" \
              "${asset_files[@]}"
            exit 0
          fi

          release_id="$(printf '%s\n' "$release_ids" | sed '/^$/d' | head -n 1)"
          gh release upload "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" "${asset_files[@]}" --clobber
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" --input release-update.json
